name: Metrics

on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ADI-2903
          base: header, repositories
          plugin_languages: yes
          plugin_languages_limit: 8
          output_action: commit
          filename: github-metrics.svg

